<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="logograd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0891b2"/>
    </linearGradient>
    <linearGradient id="logograd2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
  </defs>
  <circle cx="60" cy="60" r="56" fill="none" stroke="url(#logograd)" stroke-width="3"/>
  <circle cx="60" cy="60" r="48" fill="none" stroke="url(#logograd2)" stroke-width="1.5" opacity="0.5"/>
  <!-- Scales of Justice -->
  <g transform="translate(37,18) scale(0.6)">
    <line x1="40" y1="10" x2="40" y2="55" stroke="url(#logograd)" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="15" y1="55" x2="65" y2="55" stroke="url(#logograd2)" stroke-width="3" stroke-linecap="round"/>
    <!-- Left scale -->
    <path d="M12,10 Q15,0 25,10" fill="none" stroke="url(#logograd)" stroke-width="2.5"/>
    <line x1="12" y1="10" x2="10" y2="10" stroke="url(#logograd)" stroke-width="2"/>
    <line x1="25" y1="10" x2="27" y2="10" stroke="url(#logograd)" stroke-width="2"/>
    <circle cx="18.5" cy="10" r="3" fill="url(#logograd2)"/>
    <!-- Right scale -->
    <path d="M55,10 Q58,0 68,10" fill="none" stroke="url(#logograd)" stroke-width="2.5"/>
    <line x1="55" y1="10" x2="53" y2="10" stroke="url(#logograd)" stroke-width="2"/>
    <line x1="68" y1="10" x2="70" y2="10" stroke="url(#logograd)" stroke-width="2"/>
    <circle cx="61.5" cy="10" r="3" fill="url(#logograd2)"/>
    <!-- Base -->
    <rect x="32" y="55" width="16" height="4" rx="1" fill="url(#logograd2)"/>
    <rect x="28" y="59" width="24" height="3" rx="1" fill="url(#logograd)"/>
  </g>
  <!-- Text -->
  <text x="60" y="95" text-anchor="middle" font-family="Georgia, serif" font-size="11" font-weight="bold" fill="#0f172a">
    <tspan fill="#06b6d4">TAJ</tspan><tspan fill="#f97316"> LAW</tspan>
  </text>
</svg>
